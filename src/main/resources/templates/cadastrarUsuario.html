<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Usuário</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container form-container">
    <h2>Cadastro de Usuário</h2>

    <form th:action="@{/usuarioCTR/salvarUsuario}" th:object="${usuario}" method="post">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required>

        <label for="telefone">Telefone:</label>
        <input type="text" id="telefone" th:field="*{telefone}" required>

        <label for="username">Username:</label>
        <input type="text" id="username" th:field="*{username}" required>

        <label for="password">Senha:</label>
        <input type="password" id="password" th:field="*{password}" required>

        <label for="role">Tipo de usuário:</label>
        <select id="role" th:field="*{role}">
            <option value="ROLE_USER">Usuário</option>
            <option value="ROLE_ADMIN">Administrador</option>
        </select>

        <button type="submit">Cadastrar Usuário</button>
    </form>

    <div class="links">
        <a class="btn btn-secondary" th:href="@{/usuarioCTR/listarUsuarios}">Listar Usuários</a>
        <a class="btn btn-secondary" th:href="@{/usuarioCTR/}">Voltar ao Menu</a>
    </div>
</div>

</body>
</html>
