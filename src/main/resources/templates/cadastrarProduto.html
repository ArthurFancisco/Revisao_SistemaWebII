<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Cadastrar Produto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container form-container">
    <h2>Cadastro de Produto</h2>

    <form th:action="@{/produtoCTR/salvarProduto}" th:object="${produto}" method="post">

        <label for="nome">Nome:</label>
        <input type="text" id="nome" th:field="*{nome}" required>

        <label for="valor">Valor:</label>
        <input type="number" id="valor" th:field="*{valor}" step="0.01" required>

        <label for="categoria">Categoria:</label>
        <input type="text" id="categoria" th:field="*{categoria}" required>

        <button type="submit">Salvar Produto</button>
    </form>

    <div class="links">
        <a class="btn btn-secondary" th:href="@{/produtoCTR/listarProdutos}">Listar Produtos</a>
        <a class="btn btn-secondary" th:href="@{/usuarioCTR/}">Voltar ao Menu</a>
    </div>
</div>

</body>
</html>
