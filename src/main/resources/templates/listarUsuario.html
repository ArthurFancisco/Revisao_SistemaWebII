<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Listar Usuários</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container">
    <h2>Lista de Usuários</h2>

    <table>
        <thead>
        <tr>
            <th>ID</th>
            <th>Nome</th>
            <th>Username</th>
            <th>Telefone</th>
            <th>Role</th>
            <th>Senha Criptografada</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="usuario : ${usuarios}">
            <td th:text="${usuario.id}"></td>
            <td th:text="${usuario.nome}"></td>
            <td th:text="${usuario.username}"></td>
            <td th:text="${usuario.telefone}"></td>
            <td th:text="${usuario.role}"></td>
            <td th:text="${usuario.password}"></td>
        </tr>
        </tbody>
    </table>

    <div class="links">
        <a class="btn" th:href="@{/usuarioCTR/formCadastrarUsuario}">Novo Usuário</a>
        <a class="btn btn-secondary" th:href="@{/usuarioCTR/}">Voltar ao Menu</a>
    </div>
</div>

</body>
</html>
