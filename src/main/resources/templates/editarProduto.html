<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Editar Produto</title>
    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="container form-container">
    <h1>Editar Produto</h1>

    <form th:action="@{'/produtoCTR/alterarProduto/' + ${produtoEditar.id}}"
          th:object="${produtoEditar}"
          method="post">

        <label for="nome">Nome do Produto:</label>
        <input type="text" id="nome" th:field="*{nome}" required>

        <label for="valor">Valor:</label>
        <input type="number" id="valor" th:field="*{valor}" step="0.01" required>

        <label for="categoria">Categoria:</label>
        <input type="text" id="categoria" th:field="*{categoria}" required>

        <button type="submit">Salvar Alterações</button>
    </form>

    <div class="links">
        <a class="btn btn-secondary" th:href="@{/produtoCTR/listarProdutos}">Voltar à Listagem</a>
        <a class="btn btn-secondary" th:href="@{/usuarioCTR/}">Voltar ao Menu</a>
    </div>
</div>

</body>
</html>
